<!doctype html><html><head><meta charset="utf-8"></head><body>
<div id="count">0</div>
<p>Resource: kopi sachet</p>
<script>
(function () {
  var count = 0, prestigeCount = 0;
  var countEl = document.getElementById("count");
  function render() { countEl.textContent = String(count); }
  window.__assay = {
    start: function () {},
    click: function () { count += 1; render(); },
    tick: function (n) { count += (n || 1); render(); },
    // BUG: math prestige jalan (prestigeCount nambah beneran), tapi lupa reset
    // #count ke 0 -- bug fungsional klasik idle-game, bukan cheat. Resource name
    // dari seed tetep bener.
    forcePrestige: function (curve) {
      prestigeCount++;
      render();
    },
    getPrestigeCount: function () { return prestigeCount; }
  };
  render();
})();
</script>
</body></html>
