<!doctype html><html><head><meta charset="utf-8"></head><body>
<div class="card" data-card>1</div>
<div class="card" data-card>2</div>
<div class="card" data-card>3</div>
<div class="card" data-card>4</div>
<div class="card" data-card>5</div>
<div class="card" data-card>6</div>
<p>Tema: buah tropis</p>
<div id="win" style="display:none">MENANG!</div>
<script>
(function () {
  var SEED_X = 4; // dari seed.x yang di-assign ke peserta ini
  var matchedCount = 0;
  var flipsSinceReshuffle = 0;
  var reshuffleCount = 0;
  window.__assay = {
    start: function () {},
    forceMatch: function () { matchedCount++; },
    getMatchedCount: function () { return matchedCount; },
    flipCard: function (i) {
      flipsSinceReshuffle++;
      if (flipsSinceReshuffle > SEED_X) { reshuffleCount++; flipsSinceReshuffle = 0; }
    },
    getReshuffleCount: function () { return reshuffleCount; },
    forceWin: function () { document.getElementById("win").style.display = "block"; }
  };
})();
</script>
</body></html>
