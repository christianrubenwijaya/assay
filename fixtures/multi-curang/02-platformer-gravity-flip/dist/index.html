<!doctype html><html><head><meta charset="utf-8"></head><body>
<canvas id="game" width="320" height="240"></canvas>
<!-- prebuilt generic -- protagonis gak diganti sesuai seed yang di-assign (harusnya "batu ajaib") -->
<p>Hero: Generic Warrior</p>
<div id="win" style="display:none">MENANG!</div>
<script>
(function () {
  var gravity = "down";
  document.body.setAttribute("data-gravity", gravity);
  window.__assay = {
    start: function () {},
    triggerFlip: function () {
      gravity = (gravity === "down") ? "up" : "down";
      document.body.setAttribute("data-gravity", gravity);
    },
    forceWin: function () {
      document.getElementById("win").style.display = "block";
    }
  };
})();
</script>
</body></html>
